name: Deploy Feedback App to Hostinger

on:
  push:
    branches:
      - main # Schimbă cu 'master' dacă branch-ul tău principal se numește așa

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarcă codul
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalează Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Pune versiunea pe care o folosești

      # 3. Instalează pachetele și dă build
      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      # 4. Urcă folderul buildat pe Hostinger prin FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 # adaugat de cutu
          # Schimbă 'dist' cu 'build' dacă folosești Create React App
          local-dir: ./dist/ 
          # Folderul unde se va pune site-ul pe hostinger. 
          # De obicei este public_html/nume_folder/
          server-dir: ./

# pentru lume care mai vrea sa faca deploy
# trebuie pe Hostinger sa iti faci un cont de FTP
# FTP_SERVER = ftp.bestis.ro
# FTP_USERNAME = u{numar ciudat}.nume_pus_la_creare
# FTP_PASSWORD = parola_pusa_la_creare